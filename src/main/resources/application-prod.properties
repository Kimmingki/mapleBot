# [Server & Common]
server.port=8081
nexon.api.base-url=https://open.api.nexon.com/maplestorym/v1
spring.config.import=optional:classpath:application-secret.properties

# [Prod DB 환경 - PostgreSQL]
# 서버의 실제 DB 정보로 변경해주세요.
spring.datasource.url=jdbc:postgresql://localhost:5432/mapledb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=서버DB계정명
spring.datasource.password=서버DB비밀번호

# [Prod JPA 안전 설정]
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.h2.console.enabled=false